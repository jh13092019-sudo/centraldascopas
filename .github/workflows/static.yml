<script>
// PARTICLES
(function(){
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const COLORS = ['rgba(255,223,0,','rgba(0,156,59,','rgba(0,39,118,'];
  function rnd(a,b){ return Math.random()*(b-a)+a; }
  for(let i=0;i<60;i++){
    particles.push({ x:rnd(0,1), y:rnd(0,1), r:rnd(1,3), vx:rnd(-.15,.15), vy:rnd(-.2,-.05), alpha:rnd(.2,.7), color:COLORS[Math.floor(rnd(0,3))] });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx/W*10; p.y+=p.vy/H*10;
      if(p.y<-0.05)p.y=1.05; if(p.x<-0.05)p.x=1.05; if(p.x>1.05)p.x=-0.05;
      ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color+p.alpha+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// NAVBAR
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', ()=>{ navbar.classList.toggle('scrolled', window.scrollY>80); });

// HAMBURGER
const ham = document.getElementById('hamburger');
const mobileNav = document.getElementById('mobileNav');
ham.addEventListener('click', ()=>{
  ham.classList.toggle('open'); mobileNav.classList.toggle('open');
  document.body.style.overflow = mobileNav.classList.contains('open') ? 'hidden' : '';
});
document.querySelectorAll('.mobile-link').forEach(a=>{
  a.addEventListener('click', ()=>{ ham.classList.remove('open'); mobileNav.classList.remove('open'); document.body.style.overflow=''; });
});

// COUNTDOWN — abertura: 11 Jun 2026 16h BRT = 19:00 UTC
(function(){
  const target = new Date('2026-06-11T19:00:00Z');
  const days=document.getElementById('cd-days'), hours=document.getElementById('cd-hours'),
        mins=document.getElementById('cd-mins'), secs=document.getElementById('cd-secs');
  function pad(n){ return String(n).padStart(2,'0'); }
  function tick(){
    const diff = target - Date.now();
    if(diff<=0){ days.textContent=hours.textContent=mins.textContent=secs.textContent='00'; return; }
    days.textContent=pad(Math.floor(diff/86400000));
    hours.textContent=pad(Math.floor((diff%86400000)/3600000));
    mins.textContent=pad(Math.floor((diff%3600000)/60000));
    secs.textContent=pad(Math.floor((diff%60000)/1000));
  }
  tick(); setInterval(tick, 1000);
})();

// REVEAL
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// TABS
function showTab(id) {
  document.querySelectorAll('.jogos-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  event.target.classList.add('active');
}

// FIGURINHAS
(function(){
  const grid = document.getElementById('figurinhasGrid');
  const countries = ['🇧🇷','🇦🇷','🇫🇷','🇩🇪','🇪🇸','🇵🇹','🇮🇹','🏴󠁧󠁢󠁥󠁮󠁧󠁿','🇺🇸','🇯🇵','🇳🇱','🇲🇦','🇲🇽','🇨🇦','🇨🇴'];
  for(let i=0;i<15;i++){
    const f = document.createElement('div');
    f.className = 'figurinha';
    if(Math.random()>.4){
      f.classList.add('revealed');
      f.innerHTML = `<span>${countries[Math.floor(Math.random()*countries.length)]}</span><div class="figurinha-shine"></div>`;
      f.dataset.num = '#'+(Math.floor(Math.random()*600)+1);
    } else {
      f.innerHTML = '<span style="font-size:1.8rem;opacity:.3">?</span>';
    }
    grid.appendChild(f);
  }
})();

// NEWSLETTER
function submitNewsletter(){
  const email = document.getElementById('nlEmail').value.trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    const inp = document.getElementById('nlEmail');
    inp.style.borderColor='#e74c3c'; inp.style.boxShadow='0 0 0 3px rgba(231,76,60,0.2)'; inp.focus();
    setTimeout(()=>{ inp.style.borderColor=''; inp.style.boxShadow=''; }, 2000); return;
  }
  document.getElementById('nlForm').style.display='none';
  document.getElementById('nlSuccess').classList.add('show');
}

// REMINDER BUTTONS
document.querySelectorAll('.btn-reminder').forEach(btn=>{
  btn.addEventListener('click', function(){
    this.textContent = '✅ Lembrete ativado!';
    this.style.borderColor = 'var(--green)';
    this.style.color = 'var(--green-light)';
    this.disabled = true;
  });
});
</script>
